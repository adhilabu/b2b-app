bind 0.0.0.0
protected-mode no
port 6379
timeout 0
tcp-keepalive 300

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence (AOF for durability)
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# Logging
loglevel notice
logfile ""

# Slow query log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Database count (one per service, 0-5 reserved, 6+ for other use)
databases 16
